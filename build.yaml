---
include:

  # Left half — Studio + OLED
  - board: nice_nano_v2
    shield: eyelash_sofle_central_left nice_view
    snippet: studio-rpc-usb-uart
    cmake_args: "-DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_STUDIO_LOCKING=n -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DCONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=y"
    artifact_name: eyelash_sofle_studio_left

  # Right half — Peripheral + OLED animations
  - board: nice_nano_v2
    shield: eyelash_sofle_peripheral_right nice_view
    cmake_args: "-DCONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=y"
    artifact_name: eyelash_sofle_studio_right

  # Settings reset
  - board: nice_nano_v2
    shield: settings_reset
    artifact_name: eyelash_sofle_studio_settings_reset